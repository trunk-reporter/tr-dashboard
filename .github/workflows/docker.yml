name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          gh api --method PUT \
            "/orgs/${REPO_OWNER}/packages/container/tr-dashboard/visibility" \
            -f visibility=public || true

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version from CHANGELOG.md
            NOTES=$(awk "/^## ${VERSION#v}[[:space:]]/,/^## [0-9]/" CHANGELOG.md | sed '$d')
          fi
          if [ -z "$NOTES" ]; then
            NOTES="**Docker image:** \`ghcr.io/${{ github.repository }}:${VERSION#v}\`"
          else
            NOTES="${NOTES}

          **Docker image:** \`ghcr.io/${{ github.repository }}:${VERSION#v}\`"
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, updating notes"
            gh release edit "$VERSION" --notes "$NOTES"
          else
            gh release create "$VERSION" --title "$VERSION" --notes "$NOTES"
          fi

  notify-failure:
    if: failure()
    needs: [build-and-push, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="HTML" \
            -d text="🔴 <b>CI Failed:</b> tr-dashboard/${{ github.workflow }}%0A<b>Branch:</b> ${{ github.ref_name }}%0A<b>Commit:</b> ${{ github.event.head_commit.message || 'N/A' }}%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Run</a>"
